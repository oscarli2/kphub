<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Knowledge Product Hub User Manual (Printable)</title>
  <style>
    body { font-family: Arial, Helvetica, sans-serif; color: #222; margin: 30px; }
    img { max-width: 100%; height: auto; display: block; margin: 12px 0; }
    .manual-container { max-width: 900px; margin: 0 auto; }
    h1, h2, h3 { color: #1b3b50; }
    pre, code { background: #f5f7fa; padding: 8px; border-radius: 4px; }
    .page-break { page-break-after: always; }
    @media print { body { margin: 10mm; } .no-print { display: none; } }
  </style>
</head>
<body>
  <div class="manual-container">
    <div style="text-align:center; margin-bottom:18px;">
      <h1>Knowledge Product Hub — User Guide</h1>
      <div>Generated: 2025-11-19</div>
    </div>

    <div id="content"></div>

    <div style="margin-top:18px; font-size:12px; color:#666;" class="no-print">
      <em>Note: This is a printable rendering of `README-USER.md`.</em>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function(){
      const res = await fetch('README-USER.md');
      const md = await res.text();
      document.getElementById('content').innerHTML = marked.parse(md);
    })();
  </script>
</body>
</html>
