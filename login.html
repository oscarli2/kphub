<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>EV LGRRC KP-HUB Login</title>
  <style>
        body {
          font-family: Arial, sans-serif;
          background: #f0f0f0;
          display: flex;
          justify-content: center;
          align-items: center;
          height: 100vh;
          margin: 0;
          background: linear-gradient(135deg, #648DB3 0%, #090040 100%);
          background-attachment: fixed;
        }
        
        .login-box {
          background: #fff;
          padding: 20px 30px 50px;
          border-radius: 8px;
          box-shadow: 0 0 10px rgba(0,0,0,0.1);
          width: 450px;
          box-sizing: border-box;
        }
        
        h2 {
          text-align: center;
          color: #4CAF50;
        }
        
        input {
          width: 100%;
          padding: 10px;
          margin: 10px 0;
          border-radius: 5px;
          border: 1px solid #ccc;
          box-sizing: border-box; /* ✅ Add this */
        }
        
        button {
          width: 100%;
          padding: 15px;
          margin-top: 10px;
          background: #4CAF50;
          color: #fff;
          border: none;
          border-radius: 5px;
          cursor: pointer;
        }
        
        button:hover {
          background: #45a049;
        }
  </style>
</head>
<body>
  <div class="login-box">
      <div id="banner-placeholder" style="
          width: 100%;
          height: 150px;
          background-image: url('uploads/KPHUBBANNER.jpg');
          background-size: contain;
          background-position: center;
          background-repeat: no-repeat;
          display: flex;
          align-items: center;
          justify-content: center;
          color: white;
          font-size: 36px;
          font-weight: bold;
          text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        "></div>
    <h2>EV LGRRC KP-HUB</h2>
    <form id="loginForm">
      <input type="email" name="email" placeholder="Email" required />
      <input type="password" name="password" placeholder="Password" required />
      <button type="submit">Login</button>
    </form>
    <div id="errorMsg" style="color: red;"></div>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = function(e) {
      e.preventDefault();
      const formData = new FormData(this);
    
      fetch('login.php', {
        method: 'POST',
        body: formData
      })
      .then(async res => {
        if (!res.ok) {
          throw new Error('Network response was not ok');
        }
        const text = await res.text();
        console.log('Raw response:', text);
        return JSON.parse(text);
      })
      .then(data => {
        if (data.success) {
          window.location.href = data.redirect;
        } else {
          document.getElementById('errorMsg').innerText = data.message;
        }
      })
      .catch(err => {
        console.error('Error:', err);
        document.getElementById('errorMsg').innerText = 'Something went wrong. Check console.';
      });
    };

  </script>
</body>
</html>
